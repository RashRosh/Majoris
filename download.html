<!DOCTYPE html>

<head>

<style>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

const log=m=>document.getElementById('log').textContent+= m+'\n';
document.getElementById('go').onclick=async function(){
  this.disabled=true;
  const zip=new JSZip(), folder=zip.folder('madjoris_assets');
  let ok=0;
  for(const [name,path] of FILES){
    try{
      const r=await fetch(CDN+path);
      if(!r.ok) throw new Error(r.status);
      folder.file(name, await r.blob());
      ok++; log('✓ '+name);
    }catch(e){ log('✗ '+name+' — '+e.message); }
  }
  log('Готово: '+ok+'/'+FILES.length+'. Формирую ZIP…');
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='assets_madjoris.zip'; a.click();
  log('ZIP скачан.');
  this.disabled=false;
};
</script>
